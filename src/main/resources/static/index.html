<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarDekho AI Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080c14;
            --surface: #0e1420;
            --surface2: #141c2e;
            --border: rgba(255,255,255,0.07);
            --accent: #f0c040;
            --accent2: #e8843a;
            --text: #eef0f4;
            --muted: #6b7a99;
            --green: #34d399;
            --red: #f87171;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 780px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeUp 0.6s ease both;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(240,192,64,0.08);
            border: 1px solid rgba(240,192,64,0.2);
            border-radius: 100px;
            padding: 6px 16px 6px 10px;
            margin-bottom: 24px;
        }

        .logo-dot {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: 50%;
            display: grid; place-items: center;
            font-size: 14px;
        }

        .logo span {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(28px, 5vw, 44px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        h1 em {
            font-style: normal;
            color: var(--accent);
        }

        .subtitle {
            margin-top: 12px;
            color: var(--muted);
            font-size: 15px;
            font-weight: 300;
        }

        /* Form card */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 28px;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        @media (max-width: 520px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field.full { grid-column: 1 / -1; }

        label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        input, select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        input::placeholder { color: var(--muted); }

        input:focus, select:focus {
            border-color: rgba(240,192,64,0.5);
        }

        /* Priority pills */
        .pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.18s;
            color: var(--muted);
            user-select: none;
        }

        .pill:hover { border-color: rgba(240,192,64,0.3); color: var(--text); }

        .pill.active {
            background: rgba(240,192,64,0.12);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 500;
        }

        /* Submit button */
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #080c14;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) { background: #f5d070; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Loading */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { opacity: 0.7; }

        /* Results */
        #results { animation: fadeUp 0.5s ease both; }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Car result card */
        .car-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 14px;
            transition: border-color 0.2s, transform 0.2s;
            animation: fadeUp 0.4s ease both;
        }

        .car-card:nth-child(2) { animation-delay: 0.08s; }
        .car-card:nth-child(3) { animation-delay: 0.16s; }

        .car-card:hover {
            border-color: rgba(240,192,64,0.25);
            transform: translateY(-2px);
        }

        .car-card.top-pick {
            border-color: rgba(240,192,64,0.35);
            background: linear-gradient(135deg, rgba(240,192,64,0.05) 0%, var(--surface) 60%);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 12px;
        }

        .car-name {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.2;
        }

        .top-badge {
            background: var(--accent);
            color: #080c14;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 3px 9px;
            border-radius: 100px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .car-price {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
            margin-top: 3px;
        }

        .car-reason {
            font-size: 14px;
            line-height: 1.65;
            color: #c8d0e0;
            margin-bottom: 16px;
        }

        .pros-cons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 460px) {
            .pros-cons { grid-template-columns: 1fr; }
        }

        .pro-box, .con-box {
            border-radius: 10px;
            padding: 10px 13px;
            font-size: 13px;
            line-height: 1.5;
        }

        .pro-box {
            background: rgba(52,211,153,0.08);
            border: 1px solid rgba(52,211,153,0.15);
            color: #6ee7b7;
        }

        .con-box {
            background: rgba(248,113,113,0.07);
            border: 1px solid rgba(248,113,113,0.13);
            color: #fca5a5;
        }

        .pro-box::before { content: '✓  '; font-weight: 700; }
        .con-box::before { content: '!  '; font-weight: 700; }

        /* History chips */
        .history {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .history-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 5px 12px;
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .history-chip:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

        /* Error state */
        .error-box {
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: 12px;
            padding: 16px 20px;
            color: #fca5a5;
            font-size: 14px;
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--muted);
        }

        .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .empty p { font-size: 14px; line-height: 1.6; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="page">

    <header>
        <div class="logo">
            <div class="logo-dot">🚗</div>
            <span>CarDekho AI</span>
        </div>
        <h1>Find your <em>perfect</em><br/>car in seconds</h1>
        <p class="subtitle">Tell us what matters — AI does the rest</p>
    </header>

    <!-- Form -->
    <div class="form-card">
        <div class="form-grid">

            <div class="field">
                <label>Budget (₹ Lakhs)</label>
                <input id="budget" type="number" placeholder="e.g. 15" min="1" max="100" />
            </div>

            <div class="field">
                <label>Fuel Type</label>
                <select id="fuel">
                    <option value="any">Any Fuel</option>
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Electric">Electric</option>
                    <option value="CNG">CNG</option>
                    <option value="Hybrid">Hybrid Petrol</option>
                </select>
            </div>

            <div class="field">
                <label>Primary Use</label>
                <select id="usage">
                    <option value="city">City Commute</option>
                    <option value="highway">Highway Travel</option>
                    <option value="family">Family Use</option>
                    <option value="off-road">Off-road / Rough Roads</option>
                </select>
            </div>

            <div class="field">
                <label>Family Size</label>
                <select id="seating">
                    <option value="any">Any</option>
                    <option value="5">Upto 5 (Hatchback / Sedan)</option>
                    <option value="7">7 Seater (SUV / MPV)</option>
                </select>
            </div>

            <div class="field full">
                <label>Top Priority</label>
                <div class="pills">
                    <div class="pill active" data-val="mileage">⛽ Mileage</div>
                    <div class="pill" data-val="safety">🛡️ Safety</div>
                    <div class="pill" data-val="features">✨ Features</div>
                    <div class="pill" data-val="comfort">🛋️ Comfort</div>
                </div>
            </div>

        </div>

        <button class="btn" id="submitBtn" onclick="getRecommendations()">
            <div class="spinner"></div>
            <span class="btn-text">Find My Car →</span>
        </button>
    </div>

    <!-- Results -->
    <div id="results"></div>

</div>

<script>
    // Priority pill selection
    let selectedPriority = 'mileage';
    document.querySelectorAll('.pill').forEach(pill => {
        pill.addEventListener('click', () => {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            selectedPriority = pill.dataset.val;
        });
    });

    // Search history
    let searchHistory = JSON.parse(localStorage.getItem('carHistory') || '[]');

    function saveHistory(params) {
        const label = `₹${params.budget}L · ${params.fuelType} · ${params.priority}`;
        searchHistory = [label, ...searchHistory.filter(h => h !== label)].slice(0, 4);
        localStorage.setItem('carHistory', JSON.stringify(searchHistory));
    }

    function renderHistory() {
        if (!searchHistory.length) return '';
        return `
      <div style="margin-bottom:20px;">
        <div class="section-label">Recent searches</div>
        <div class="history">
          ${searchHistory.map(h => `<div class="history-chip">${h}</div>`).join('')}
        </div>
      </div>`;
    }

    async function getRecommendations() {
        const budget = document.getElementById('budget').value;
        const fuel   = document.getElementById('fuel').value;
        const usage  = document.getElementById('usage').value;
        const seating = document.getElementById('seating').value;

        if (!budget || Number(budget) <= 0) {
            showError('Please enter a valid budget in lakhs.');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.classList.add('loading');

        document.getElementById('results').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <p>Analysing ${budget > 0 ? Math.floor(25) : 0} cars for you...<br/>
        <span style="font-size:12px;margin-top:6px;display:block;">This takes 3–5 seconds</span></p>
      </div>`;

        const params = {
            budget: Number(budget),
            fuelType: fuel,
            usage: usage,
            priority: selectedPriority,
            bodyType: 'any',
            transmission: 'any',
            minSafety: 0,
            seating: seating
        };

        try {
            const res = await fetch('/api/recommend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });

            if (!res.ok) throw new Error(`Server error: ${res.status}`);

            const data = await res.json();

            let insights = [];
            try {
                insights = typeof data.aiOutput === 'string'
                    ? JSON.parse(data.aiOutput)
                    : data.aiOutput;
            } catch (e) {
                console.error('AI parse failed', data.aiOutput);
            }

            saveHistory(params);
            renderResults(insights, params);

        } catch (err) {
            showError(`Could not connect to the server. Make sure your Spring Boot backend is running on port 8080.<br/><small style="opacity:0.6">${err.message}</small>`);
        } finally {
            btn.disabled = false;
            btn.classList.remove('loading');
        }
    }

    function renderResults(insights, params) {
        const resultsEl = document.getElementById('results');

        if (!insights || insights.length === 0) {
            resultsEl.innerHTML = `
        ${renderHistory()}
        <div class="error-box">
          No cars found matching your criteria. Try increasing your budget or selecting "Any Fuel".
        </div>`;
            return;
        }

        const cards = insights.map((car, i) => `
      <div class="car-card ${i === 0 ? 'top-pick' : ''}">
        <div class="card-header">
          <div>
            <div class="car-name">${car.name || 'Unknown Car'}</div>
            ${car.price ? `<div class="car-price">₹ ${car.price}</div>` : ''}
          </div>
          ${i === 0 ? '<div class="top-badge">⭐ Best Match</div>' : `<div style="color:var(--muted);font-size:13px;">#${i+1}</div>`}
        </div>
        <p class="car-reason">${car.reason || ''}</p>
        <div class="pros-cons">
          <div class="pro-box">${car.pros || '—'}</div>
          <div class="con-box">${car.cons || '—'}</div>
        </div>
      </div>
    `).join('');

        resultsEl.innerHTML = `
      ${renderHistory()}
      <div class="section-label">AI Recommendations · ₹${params.budget}L · ${params.fuelType === 'any' ? 'Any fuel' : params.fuelType}</div>
      ${cards}
      <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:20px;">
        Prices are approximate. Always verify at the dealership before purchase.
      </p>`;
    }

    function showError(msg) {
        document.getElementById('results').innerHTML = `
      <div class="error-box">⚠️ ${msg}</div>`;
    }

    // Enter key support
    document.getElementById('budget').addEventListener('keydown', e => {
        if (e.key === 'Enter') getRecommendations();
    });

    // Show history on load if exists
    if (searchHistory.length) {
        document.getElementById('results').innerHTML = renderHistory();
    }
</script>
</body>
</html>
